<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empresa Artículos - Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div id="app-empresa" class="container mt-5">
        <h2>Gestión de Artículos (Bootstrap)</h2>
        <button type="button" class="btn btn-primary" id="body_btProcesarArticulo">Procesar Artículo</button>
        <hr>
        <div class="row">
            <div class="col-md-12">
                
                <div class="alert alert-success">
                    La ganancia será de Bs. <span id="body_lblGanancia" class="fw-bold">0</span>
                </div>
                <div class="alert alert-warning">
                    El artículo con mayor precio de venta es: <span id="body_lblArticuloMayor" class="fw-bold">0</span>
                </div>
                
            </div>
        </div>
    </div>

    <!-- Modal para ingresar artículo -->
    <div class="modal fade" id="articulo" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Procesar Artículo</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Código:</label>
                        <input type="number" class="form-control" id="articulo_inCodigo" placeholder="888">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Costo:</label>
                        <input type="number" class="form-control" id="articulo_inCosto" placeholder="Ej: 100">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Precio de Venta:</label>
                        <input type="number" class="form-control" id="articulo_inVenta" placeholder="Ej: 150">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="articulo_btCancelar" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-success" id="articulo_btAceptar">Aceptar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
        import Cl_cEmpresaArticulos from "./dist/controllers/Cl_cEmpresaArticulos.js";
        import Cl_cArticulo from "./dist/controllers/Cl_cArticulo.js";
        import Cl_vEmpresaArticulosBootstrap from "./dist/views/Cl_vEmpresaArticulosBootstrap.js";
        import Cl_vArticuloBootstrap from "./dist/views/Cl_vArticuloBootstrap.js";

        const vistaEmpresa = new Cl_vEmpresaArticulosBootstrap();
        const vistaArticulo = new Cl_vArticuloBootstrap();
        const controladorArticulo = new Cl_cArticulo(vistaArticulo);
        new Cl_cEmpresaArticulos(vistaEmpresa, controladorArticulo);
    </script>
</body>
</html>
