<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Empresa - Plain</title>
</head>
<body>
    <div id="body">
        <section id="personal" hidden>
            <h5>Procesar Personal</h5>
            <div>
                <label>Nombre: <input type="text" id="personal_inNombre" placeholder="Jose"></label>
            </div>
            <div>
                <label>Tipo: <input type="number" id="personal_inTipo" placeholder="1=Obrero, 2=Administrativo"></label>
            </div>
            <div>
                <label>Salario base: <input type="number" id="personal_inSalario" placeholder="Ej: 100"></label>
            </div>
            
            <div>
                <button id="personal_btCancelar">Cancelar</button>
                <button id="personal_btAceptar">Aceptar</button>
            </div>
        </section>

        <hr>

        <button id="body_btProcesarPersonal">Procesar Personal</button>

        <div>Monto total obreros: $<span id="body_lblTotalObreros">0</span></div>
        <div>Promedio obreros: $<span id="body_lblPromedioObreros">0</span></div>
        <div>Monto total administrativos: $<span id="body_lblTotalAdministrativos">0</span></div>
        <div>Promedio administrativos: $<span id="body_lblPromedioAdministrativos">0</span></div>
         <div>Personal Procesado: <span id="body_lblTotalProcesados">0</span></div>
          <div>Porcentaje Obreros: <span id="body_lblPorcentajeobreros">0</span>%</div>
        <hr>
        
    </div>

    <script type="module">
        import Cl_cEmpresa from "./dist/controllers/Cl_cEmpresa.js";
        import Cl_cPersonal from "./dist/controllers/Cl_cPersonal.js";
        import Cl_vEmpresaPlain from "./dist/views/Cl_vEmpresaPlain.js";
        import Cl_vPersonalPlain from "./dist/views/Cl_vPersonalPlain.js";

        const vistaEmpresa = new Cl_vEmpresaPlain();
        const vistaPersonal = new Cl_vPersonalPlain();
        const controladorPersonal = new Cl_cPersonal(vistaPersonal);
        new Cl_cEmpresa(vistaEmpresa, controladorPersonal);
    </script>
</body>
</html>
